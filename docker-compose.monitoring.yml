services:
    prometheus:
      image: prom/prometheus:latest
      volumes:
        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      ports:
        - "9090:9090"
      networks:
        - rte_net
        
    grafana:
      image: grafana/grafana:latest
      ports:
        - "3000:3000"
      depends_on:
        - prometheus
        - loki
      environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
      volumes:
        - grafana_data:/var/lib/grafana
        - ./monitoring/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
        - ./monitoring/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
        - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/grafana-dashboard.json:ro
      networks:
        - rte_net

    loki:
      image: grafana/loki:latest
      ports:
        - "3100:3100"
      command: -config.file=/etc/loki/config.yml
      volumes:
        - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
        - loki_data:/loki
      networks:
        - rte_net

    promtail:
      image: grafana/promtail:latest
      depends_on:
        - loki
      command: -config.file=/etc/promtail/config.yml
      volumes:
        - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
        - ./logs:/logs:ro
        - promtail_positions:/tmp
      networks:
        - rte_net

volumes:
  loki_data:
  promtail_positions:
  grafana_data:

networks:
  rte_net:
    name: rte_cap_network