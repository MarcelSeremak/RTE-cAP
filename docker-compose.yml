services:
  kafka:
    image: apache/kafka:${KAFKA_VERSION}
    ports:
      - ${KAFKA_HOST_PORT}:9092
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "CONTAINER://:19092,LOCAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "CONTAINER://kafka:19092,LOCAL://localhost:${KAFKA_HOST_PORT}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTAINER:PLAINTEXT,LOCAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "CONTAINER"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  db:
    image: postgres:15
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8090:8090"
    volumes:
      - ./dbt:/app/dbt
    working_dir: /app/dbt
    environment:
      DBT_PROFILES_DIR: /app/dbt
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SCHEMA: stg
      DBT_THREADS: 4
    command: ["dbt", "build"]

volumes:
  pgdata: