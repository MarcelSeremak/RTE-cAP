services:
  kafka:
    image: apache/kafka:${KAFKA_VERSION}
    ports:
      - ${KAFKA_HOST_PORT}:9092
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "CONTAINER://:19092,LOCAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "CONTAINER://kafka:19092,LOCAL://localhost:${KAFKA_HOST_PORT}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTAINER:PLAINTEXT,LOCAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "CONTAINER"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:19092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  db:
    image: postgres:15
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8090:8090"
    volumes:
      - ./dbt:/app/dbt
    working_dir: /app/dbt
    environment:
      DBT_PROFILES_DIR: /app/dbt
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SCHEMA: stg
      DBT_THREADS: 4
    command: ["dbt", "build"]

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_HOST: ${KAFKA_HOST}
      KAFKA_INTERNAL_PORT: ${KAFKA_INTERNAL_PORT}
      KAFKA_TOPIC: orders
      GEN_RATE: ${GEN_RATE}
      METRICS_PORT: 9103
    volumes:
      - ./logs:/app/logs

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_HOST: ${KAFKA_HOST}
      KAFKA_INTERNAL_PORT: ${KAFKA_INTERNAL_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DATABASE_URL: ${DATABASE_URL}
      METRICS_PORT: 9102
    volumes:
      - ./logs:/app/logs

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      KAFKA_HOST: ${KAFKA_HOST}
      KAFKA_INTERNAL_PORT: ${KAFKA_INTERNAL_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./logs:/app/logs

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    depends_on:
      - loki
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/logs:ro
      - promtail_positions:/tmp

volumes:
  pgdata:
  loki_data:
  promtail_positions:
  grafana_data: