apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus-main
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    uid: loki-main
    type: loki
    access: proxy
    url: http://loki:3100

  - name: PostgreSQL
    uid: postgres-main
    type: postgres
    access: proxy
    url: db:5432
    user: $POSTGRES_USER
    secureJsonData:
      password: $POSTGRES_PASSWORD
    jsonData:
      database: $POSTGRES_DB
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
